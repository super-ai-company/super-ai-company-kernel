syntax = "proto3";

package company.kernel.v1;

service CompanyKernel {
  rpc Describe(DescribeRequest) returns (ApiResponse);
  rpc Get(RouteRequest) returns (ApiResponse);
  rpc Post(RouteRequest) returns (ApiResponse);
}

message DescribeRequest {}

message RouteRequest {
  string path = 1;
  map<string, string> query = 2;
  string body_json = 3;
}

message ApiResponse {
  int32 status = 1;
  string body_json = 2;
}
